name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NarezIn
          base: header, activity, community, repositories
          filename: github-stats.svg

      # - name: Coding Habits
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     user: NarezIn
      #     base: ""
      #     plugin_habits: yes
      #     plugin_habits_facts: yes
      #     plugin_habits_charts: yes
      #     filename: github-habits.svg

      - name: Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NarezIn
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_ignored: csv
          plugin_languages_skipped: CS61B
          filename: github-languages.svg
